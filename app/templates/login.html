{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4 mt-5 shadow-sm">
            <h3 class="text-center mb-4 text-secondary">Sign In</h3>
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-all form-control" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 mt-2">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
